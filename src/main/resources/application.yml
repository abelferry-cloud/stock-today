server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: stock-analysis-platform

  # Database: MySQL Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/stock_analysis?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # Cache: Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5

  # Message Queue: RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
    publisher-confirm-type: correlated
    publisher-returns: true

  # Spring AI Configuration
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:sk-3292ec3617e043498831e905aea1466e}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    # Vector Store Configuration for RAG
    vectorstore:
      redis:
        uri: redis://localhost:6379
        index-name: stock-knowledge
        prefix: "doc:"

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.stock.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false

# Logging Configuration
logging:
  level:
    root: INFO
    com.stock.platform: DEBUG
    org.springframework.ai: DEBUG
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/stock-platform.log
    max-size: 100MB
    max-history: 30

# Application Custom Configuration
app:
  stock:
    # Stock data crawling configuration
    crawl-interval: 3600000  # 1 hour in milliseconds
    max-retry: 3
    timeout: 30000

  rag:
    # RAG knowledge base configuration
    chunk-size: 1000
    chunk-overlap: 200
    top-k: 5
    temperature: 0.7
