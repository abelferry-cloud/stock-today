spring:
  application:
    name: stock-analysis-ai
  ai:
    deepseek:
      api-key: sk-9091595d4dbf4f49b1ab4c31afc34aa0
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    openai: # 阿里云百炼平台兼容OpenAI，所以这里使用阿里云百炼平台地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-67e26ed4c90b4d14b99e58664e6189d7
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
  rabbitmq:
    host: localhost
    port: 5672
    username: jovan
    password: 123456
    # 开启确认模式机制（生产端）
    publisher-confirm-type: CORRELATED # 异步回调
    publisher-returns: true # 消息路由失败回调
    template:
      mandatory: true # 强制回调
    # 开启确认模式机制（消费端）
    listener:
      simple:
        acknowledge-mode: manual # 手动确认ack
        prefetch: 1 # 限流，防止消费者负载过重

server:
  port: 8080

# Knife4j 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false
