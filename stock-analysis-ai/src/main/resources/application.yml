spring:
  application:
    name: stock-analysis-ai
  profiles:
    active: db,cache,canal
  rabbitmq:
    host: ${RABBITMQ_HOST:172.23.70.33}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:jovan}
    password: ${RABBITMQ_PASSWORD:123456}
    virtual-host: /stock-today
    # 开启确认模式机制（生产端）
    publisher-confirm-type: CORRELATED
    publisher-returns: true
    template:
      mandatory: true
    # 消费端配置
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
  ai:
    deepseek:
      # 多个 API Key 配置（数组格式）- 支持负载均衡和 429 自动冷却
      api-keys:
        - YOUR_DEEPSEEK_API_KEY_1
        - YOUR_DEEPSEEK_API_KEY_2
        - YOUR_DEEPSEEK_API_KEY_3
      # 单个 API Key（供 Spring AI 自动配置使用，取 api-keys 的第一个）
      # Spring AI 3.x 版本的 DeepSeek starter 需要此配置来创建 Bean
      api-key: YOUR_DEEPSEEK_API_KEY_1
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    openai: # 阿里云百炼平台兼容OpenAI，所以这里使用阿里云百炼平台地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: YOUR_ALIYUN_DASHSCOPE_API_KEY
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024

    # Pinecone向量存储配置
    vectorstore:
      pinecone:
        api-key: YOUR_PINECONE_API_KEY
        index-name: stock-analysis-index


server:
  port: 8080

# Knife4j 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false

# 自定义RabbitMQ配置
stock:
  rabbitmq:
    vector-queue: stock.vector.queue
    data-exchange: stock.data.exchange
    vector-routing-key: stock.data.vector
    dlx-exchange: stock.data.dlx.exchange
    dlx-routing-key: stock.data.dlx
    dlq-queue: stock.vector.dlq

  # 限流器配置（Resilience4j RateLimiter）
  ratelimiter:
    enabled: true
    # 令牌桶容量（允许的最大突发请求数）
    limit-for-period: 5
    # 令牌刷新周期（每秒补充一次令牌）
    limit-refresh-period: 1s
    # 获取令牌的超时时间
    timeout-duration: 3s
