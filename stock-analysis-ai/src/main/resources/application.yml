spring:
  application:
    name: stock-analysis-ai
  rabbitmq:
    host: ${RABBITMQ_HOST:172.23.70.33}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:jovan}
    password: ${RABBITMQ_PASSWORD:123456}
    virtual-host: /stock-today
    # 开启确认模式机制（生产端）
    publisher-confirm-type: CORRELATED
    publisher-returns: true
    template:
      mandatory: true
    # 消费端配置
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
  ai:
    deepseek:
      # 多个 API Key 配置（数组格式）- 支持负载均衡和 429 自动冷却
      api-keys:
        - sk-9091595d4dbf4f49b1ab4c31afc34aa0
        - sk-adc25cfc02cb4744a77afbce97f3a244
        - sk-3d7e2f405ba14477974dfe5a3d241d53
      # 单个 API Key（供 Spring AI 自动配置使用，取 api-keys 的第一个）
      # Spring AI 3.x 版本的 DeepSeek starter 需要此配置来创建 Bean
      api-key: sk-9091595d4dbf4f49b1ab4c31afc34aa0
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    openai: # 阿里云百炼平台兼容OpenAI，所以这里使用阿里云百炼平台地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-67e26ed4c90b4d14b99e58664e6189d7
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024

    # Pinecone向量存储配置
    vectorstore:
      pinecone:
        api-key: pcsk_3H9pHS_E5Y2zhQCrm7r5YuhkQY5M7eZeXqWYLTbaY1Uo4GoyvuXd9Mb6Sui6iiMSFvmdR4
        index-name: stock-analysis-index


server:
  port: 8080

# Knife4j 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false

# 自定义RabbitMQ配置
stock:
  rabbitmq:
    vector-queue: stock.vector.queue
    data-exchange: stock.data.exchange
    vector-routing-key: stock.data.vector
    dlx-exchange: stock.data.dlx.exchange
    dlx-routing-key: stock.data.dlx
    dlq-queue: stock.vector.dlq
