spring:
  application:
    name: stock-analysis-ai
  ai:
    deepseek:
      # 多个 API Key 配置（数组格式）- 支持负载均衡和 429 自动冷却
      api-keys:
        - sk-9091595d4dbf4f49b1ab4c31afc34aa0
        - sk-adc25cfc02cb4744a77afbce97f3a244
        - sk-3d7e2f405ba14477974dfe5a3d241d53
      # 单个 API Key（供 Spring AI 自动配置使用，取 api-keys 的第一个）
      # Spring AI 3.x 版本的 DeepSeek starter 需要此配置来创建 Bean
      api-key: sk-9091595d4dbf4f49b1ab4c31afc34aa0
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    openai: # 阿里云百炼平台兼容OpenAI，所以这里使用阿里云百炼平台地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-67e26ed4c90b4d14b99e58664e6189d7
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024

    # Pinecone向量存储配置
    vectorstore:
      pinecone:
        api-key: pcsk_3H9pHS_E5Y2zhQCrm7r5YuhkQY5M7eZeXqWYLTbaY1Uo4GoyvuXd9Mb6Sui6iiMSFvmdR4
        index-name: stock-analysis-index

  rabbitmq:
    host: localhost
    port: 5672
    username: jovan
    password: 123456
    # 开启确认模式机制（生产端）
    publisher-confirm-type: CORRELATED # 异步回调
    publisher-returns: true # 消息路由失败回调
    template:
      mandatory: true # 强制回调
    # 开启确认模式机制（消费端）
    listener:
      simple:
        acknowledge-mode: manual # 手动确认ack
        prefetch: 1 # 限流，防止消费者负载过重
        retry:
          enabled: true # 开启重试
          initial-interval: 1000 # 初始重试间隔
          max-attempts: 3 # 最大重试次数
          max-interval: 10000 # 最大重试间隔
          multiplier: 2 # 重试间隔倍数
    # 股票相关队列配置
    stock:
      vectorQueue: stock.vector.queue
      rawDataQueue: stock.raw.data.queue
      innerMarketQueue: innerMarketQueue
      outerMarketQueue: stock.outer.market.queue
      dataExchange: stock.data.exchange
      stockExchange: stockExchange
      vectorRoutingKey: stock.data.vector
      rawDataRoutingKey: stock.data.raw
      innerMarketRoutingKey: inner.market
      outerMarketRoutingKey: stock.outer.market

server:
  port: 8080

# Knife4j 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false
